<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SocialSpark — Join Us</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">Social<span>Spark</span></div>
    <p class="auth-tagline">Share moments, connect with people</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <!-- login form -->
    <div id="form-login">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn-auth" id="btn-login" onclick="handleLogin()">Login</button>
      <p style="text-align:center; margin-top:1rem; font-size:0.825rem; color:var(--text-muted);">
        No account?
        <a href="#" onclick="switchTab('register')"
           style="color:var(--primary); font-weight:600;">Register here</a>
      </p>
    </div>

    <!-- register form -->
    <div id="form-register" style="display:none;">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="cooluser123" />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" />
      </div>
      <div class="form-group">
        <label for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Repeat password" />
      </div>
      <button class="btn-auth" id="btn-register" onclick="handleRegister()">Create Account</button>
      <p style="text-align:center; margin-top:1rem; font-size:0.825rem; color:var(--text-muted);">
        Already have one?
        <a href="#" onclick="switchTab('login')"
           style="color:var(--primary); font-weight:600;">Login</a>
      </p>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
