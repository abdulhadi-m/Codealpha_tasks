<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProjectFlow — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">Project<span>Flow</span></div>
    <p class="auth-sub">Manage your team projects in one place</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"
              onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register"
              onclick="switchTab('register')">Register</button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <!-- login -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" style="width:100%;"
              id="btn-login" onclick="handleLogin()">
        Login
      </button>
      <p style="text-align:center; margin-top:0.9rem;
                font-size:0.825rem; color:var(--text-muted);">
        No account?
        <a href="#" onclick="switchTab('register')"
           style="color:var(--primary); font-weight:600;">Register</a>
      </p>
    </div>

    <!-- register -->
    <div id="form-register" style="display:none;">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="e.g. johndoe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Same password again" />
      </div>
      <button class="btn btn-primary" style="width:100%;"
              id="btn-register" onclick="handleRegister()">
        Create Account
      </button>
      <p style="text-align:center; margin-top:0.9rem;
                font-size:0.825rem; color:var(--text-muted);">
        Already have one?
        <a href="#" onclick="switchTab('login')"
           style="color:var(--primary); font-weight:600;">Login</a>
      </p>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
